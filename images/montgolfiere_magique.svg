<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <g fill="none" stroke="#1e293b" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
    <!-- Fluffy Cloud (Left) -->
    <path d="M 8 72 C 8 66, 16 64, 19 68 C 22 63, 29 64, 31 69 C 35 69, 38 73, 35 78 C 32 82, 10 82, 8 72 Z" stroke-width="2" />
    
    <!-- Fluffy Cloud (Right) -->
    <path d="M 68 76 C 68 71, 74 69, 77 73 C 81 68, 88 69, 90 74 C 94 74, 96 78, 93 83 C 90 87, 70 87, 68 76 Z" stroke-width="2" />
    
    <!-- The Balloon Envelope -->
    <path d="M 50 14 C 22 14, 22 52, 42 60 C 44 61, 44 61, 43 66 L 57 66 C 56 61, 56 61, 58 60 C 78 52, 78 14, 50 14 Z" />
    
    <!-- Vertical Stripe Patterns on Balloon -->
    <path d="M 50 14 L 50 66" />
    <path d="M 50 14 Q 35 32, 44 66" />
    <path d="M 50 14 Q 65 32, 56 66" />
    
    <!-- Horizontal Curved Pattern (Middle) -->
    <path d="M 28 36 Q 50 45, 72 36" stroke-dasharray="1 3" stroke-width="2" />
    <path d="M 32 46 Q 50 55, 68 46" stroke-dasharray="1 3" stroke-width="2" />
    
    <!-- Stars on Balloon Panels -->
    <!-- Center Panel Star -->
    <path d="M 50 25 L 51 28 L 54 28 L 51.5 29.5 L 52.5 32.5 L 50 31 L 47.5 32.5 L 48.5 29.5 L 46 28 L 49 28 Z" stroke-width="1.5" />
    
    <!-- Ropes connecting Basket -->
    <path d="M 44 66 L 45 76" />
    <path d="M 48 66 L 48 76" />
    <path d="M 52 66 L 52 76" />
    <path d="M 56 66 L 55 76" />
    
    <!-- Basket -->
    <rect x="43" y="76" width="14" height="11" rx="2" />
    <!-- Woven Basket lines -->
    <path d="M 43 81 L 57 81" stroke-width="1.5" />
    <path d="M 47 76 L 47 87" stroke-width="1.5" />
    <path d="M 53 76 L 53 87" stroke-width="1.5" />
    
    <!-- Sandbags hanging from basket -->
    <circle cx="41.5" cy="80" r="1.5" />
    <path d="M 42 77 Q 41.5 79, 41.5 80" stroke-width="1" />
    <circle cx="58.5" cy="80" r="1.5" />
    <path d="M 58 77 Q 58.5 79, 58.5 80" stroke-width="1" />
    
    <!-- Magic Sparkles in the Sky -->
    <path d="M 18 24 L 18 30 M 15 27 L 21 27" stroke-width="1.5" />
    <path d="M 82 22 L 82 28 M 79 25 L 85 25" stroke-width="1.5" />
    <circle cx="26" cy="18" r="1" />
    <circle cx="74" cy="15" r="1" />
    <circle cx="86" cy="38" r="1.5" />
    <circle cx="12" cy="42" r="1.5" />
    
    <!-- Cute Birds Flying -->
    <!-- Bird 1 -->
    <path d="M 14 50 Q 18 46, 22 50 Q 26 46, 30 50" stroke-width="1.5" />
    <!-- Bird 2 -->
    <path d="M 72 56 Q 75 53, 78 56 Q 81 53, 84 56" stroke-width="1.2" />
  </g>
</svg>